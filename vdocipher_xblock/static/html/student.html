<div class="vdocipher-xblock-wrapper">
    <h3 class="vdo-title">{display_name}</h3>

    <div class="vdo-error" id="vdo-error" style="display:none;"></div>

    <div class="vdo-container" id="vdo-container" data-video-id="{video_id}">
        <div class="vdo-loading">Loading video...</div>
    </div>

    <div class="vdo-progress-bar">
        <div class="vdo-progress-fill" style="width:{completion_percentage}%"></div>
    </div>
    <div class="vdo-progress-info">
        <span class="vdo-progress-text">{completion_percentage}% watched</span>
        <span class="vdo-completed-badge" style="display:{completed_display}">&#10003; Complete</span>
    </div>
</div>
